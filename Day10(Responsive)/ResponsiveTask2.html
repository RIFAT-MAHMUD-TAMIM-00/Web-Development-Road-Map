<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design a responsive grid layout</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
        }
        .layout1{
            background-color: lightblue;
            border-radius: 10px;
            
        }
        .layoutTwo{
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;

        }
        .layout2{
            background-color: lightgreen;
            border-radius: 10px;
        }
        .layoutThree{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .layout3{
            background-color: lightcoral;
            border-radius: 10px;
        }
        .layout4{
            background-color: lightyellow;
            border-radius: 10px;
        }
        @media screen and (max-width: 576px){
            .container{
                grid-template-columns: repeat(1, 1fr);
            }
            .layoutThree{
                grid-template-columns: repeat(1, 1fr);
            }
           
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="layout1">
            <h1>1</h1>

        </div>
        <div class="layoutTwo">
            <div class="layout2">
                <h1>2</h1>
            </div>
            <div class="layoutThree">
                <div class="layout3">
                    <h1>3</h1>
                </div>
                <div class="layout4">
                    <h1>4</h1>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
