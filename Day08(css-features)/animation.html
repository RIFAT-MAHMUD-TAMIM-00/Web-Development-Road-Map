<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      
      .stage {
        width: 500px;
        height: 300px;
        border: 2px solid blue;
        background-color: aquamarine;
      }
      .ball {
        width: 50px;
        height: 50px;
        background-color: red;
        border-radius: 50%;
        position: relative;
        /*animation: ping-pong 2s ease-in-out 1s 3 alternate forwards;*/
        animation: bounce 2s ease-in-out 1s 3 alternate forwards;
      }
      @keyframes ping-pong {
        from{
            left: 0px;
        }
        to {
            left: 450px;
        }
      }
      @keyframes bounce {
      0%{
        top:0px;
        left:0px;
        
      }
      50%{
        top:250px;
        left:225px; 
      }
      100%{
        top:0px;
        left:450px;
      }
    }
    </style>
  </head>
  <body>
    <h2>Explore animation</h2>
    <div class="stage">
      <div class="ball"></div>
    </div>
  </body>
</html>
